function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

function outcomeSign(a, b) {
  if (a > b) return 1;
  if (a < b) return -1;
  return 0;
}

function calcPoints(pred, result) {
  if (!pred || !result) return null;
  if (pred.a === result.a && pred.b === result.b) return POINTS_EXACT;
  if (outcomeSign(pred.a, pred.b) === outcomeSign(result.a, result.b)) return POINTS_OUTCOME;
  return 0;
}

function computeRanking(data) {
  return data.participants
    .map((name) => {
      let points = 0,
        exact = 0,
        partial = 0,
        played = 0;
      data.matches.forEach((m) => {
        const result = data.results[m.id];
        if (!result) return;
        const pred = data.predictions[m.id]?.[name];
        const pts = calcPoints(pred, result);
        if (pts === null) return;
        played += 1;
        points += pts;
        if (pts === POINTS_EXACT) exact += 1;
        else if (pts === POINTS_OUTCOME) partial += 1;
      });
      return { name, points, exact, partial, played };
    })
    .sort((a, b) => b.points - a.points || b.exact - a.exact || a.name.localeCompare(b.name));
}

function MatchLabel({ m }) {
  return (
    <span>
      {m.teamA} x {m.teamB}
      {m.fase ? <span className="tag">{m.fase}</span> : null}
    </span>
  );
}

function groupMatches(matches) {
  const groups = {};
  matches.forEach((m) => {
    const key = m.fase || "Outros jogos";
    if (!groups[key]) groups[key] = [];
    groups[key].push(m);
  });
  return groups;
}

function dateSortKey(d) {
  if (!d) return 999999;
  const parts = d.split("/");
  if (parts.length < 2) return 999999;
  const dd = parseInt(parts[0], 10) || 0;
  const mm = parseInt(parts[1], 10) || 0;
  return mm * 100 + dd;
}

function getSortedDates(matches) {
  const dates = [...new Set(matches.map((m) => m.data || "Sem data"))];
  return dates.sort((a, b) => dateSortKey(a) - dateSortKey(b));
}

function groupMatchesByDate(matches) {
  const groups = {};
  matches.forEach((m) => {
    const key = m.data || "Sem data";
    if (!groups[key]) groups[key] = [];
    groups[key].push(m);
  });
  return groups;
}

function App() {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState("");
  const [saving, setSaving] = useState(false);
  const [refreshing, setRefreshing] = useState(false);
  const [activeTab, setActiveTab] = useState("ranking");
  const [isAdmin, setIsAdmin] = useState(false);
  const [pinInput, setPinInput] = useState("");
  const [pinError, setPinError] = useState("");
  const [adminTab, setAdminTab] = useState("participantes");
  const [selectedDate, setSelectedDate] = useState("");

  const [loadError, setLoadError] = useState("");

  async function loadData() {
    try {
      const res = await withTimeout(
        fetch(`${JSONBIN_URL}/latest`, {
          headers: { "X-Access-Key": JSONBIN_ACCESS_KEY },
        }),
        10000,
        "get"
      );
      if (!res.ok) throw new Error(`http:${res.status}`);
      const json = await res.json();
      const record = json && json.record;
      if (record && Array.isArray(record.matches)) {
        setData({ ...DEFAULT_DATA, ...record });
      } else {
        setData((prev) => prev || DEFAULT_DATA);
      }
      setLoadError("");
    } catch (e) {
      setData((prev) => prev || DEFAULT_DATA);
      if (String(e.message).startsWith("timeout")) {
        setLoadError("Demorou demais para carregar os dados. Toque em \"Atualizar\" para tentar de novo.");
      } else {
        setLoadError(`Não foi possível carregar os dados (detalhe técnico: ${e.message || e}). Toque em "Atualizar" para tentar de novo.`);
      }
    } finally {
      setLoading(false);
    }
  }

  useEffect(() => {
    loadData();
    function handleVisibility() {
      if (document.visibilityState === "visible") loadData();
    }
    document.addEventListener("visibilitychange", handleVisibility);
    const interval = setInterval(() => {
      if (document.visibilityState === "visible") loadData();
    }, 30000);
    return () => {
      document.removeEventListener("visibilitychange", handleVisibility);
      clearInterval(interval);
    };
  }, []);

  async function persist(newData) {
    setData(newData);
    setSaving(true);
    setError("");
    try {
      const res = await withTimeout(
        fetch(JSONBIN_URL, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            "X-Access-Key": JSONBIN_ACCESS_KEY,
          },
          body: JSON.stringify(newData),
        }),
        10000,
        "set"
      );
      if (!res.ok) throw new Error(`http:${res.status}`);
    } catch (e) {
      if (String(e.message).startsWith("timeout")) {
        setError("O salvamento demorou demais. Tente de novo em alguns segundos.");
      } else {
        setError(`Não foi possível salvar (detalhe técnico: ${e.message || e}). Verifique sua conexão e tente de novo.`);
      }
    } finally {
      setSaving(false);
    }
  }

  const ranking = useMemo(() => (data ? computeRanking(data) : []), [data]);
  const finishedCount = useMemo(
    () => (data ? data.matches.filter((m) => data.results[m.id]).length : 0),
    [data]
  );

  if (loading || !data) {
    return (
      <div className="bolao">
        <style>{CSS}</style>
        <div className="loading">Carregando bolão...</div>
      </div>
    );
  }

  const leader = ranking.find((r) => r.played > 0);

  async function handleRefresh() {
    setRefreshing(true);
    await loadData();
    setRefreshing(false);
  }

  return (
    <div className="bolao">
      <style>{CSS}</style>
      <header className="bolao-header">
        <div className="header-top">
          <h1>🏆 Bolão Copa 2026 — Família Corredor</h1>
          <button className="refresh-btn" onClick={handleRefresh} disabled={refreshing}>
            {refreshing ? "..." : "↻ Atualizar"}
          </button>
        </div>
        <p>
          {data.matches.length} jogo(s) cadastrado(s) · {finishedCount} finalizado(s)
          {leader ? (
            <>
              {" "}· líder: <span className="leader">{leader.name} ({leader.points} pts)</span>
            </>
          ) : null}
        </p>
      </header>
      {loadError && <div className="load-error">{loadError}</div>}

      <nav className="bolao-nav">
        <button className={activeTab === "ranking" ? "active" : ""} onClick={() => setActiveTab("ranking")}>
          Ranking
        </button>
        <button className={activeTab === "palpites" ? "active" : ""} onClick={() => setActiveTab("palpites")}>
          Palpites
        </button>
        <button className={activeTab === "jogos" ? "active" : ""} onClick={() => setActiveTab("jogos")}>
          Jogos
        </button>
        <button className={activeTab === "chaveamento" ? "active" : ""} onClick={() => setActiveTab("chaveamento")}>
          🏆 Mata-mata
        </button>
        <button className={activeTab === "admin" ? "active" : ""} onClick={() => setActiveTab("admin")}>
          🔒 Organizador
        </button>
      </nav>

      <main className="bolao-main">
        {activeTab === "ranking" && <RankingTab ranking={ranking} />}
        {activeTab === "palpites" && (
          <PalpitesTab
            data={data}
            selectedDate={selectedDate}
            setSelectedDate={setSelectedDate}
          />
        )}
        {activeTab === "jogos" && <JogosTab data={data} />}
        {activeTab === "chaveamento" && <ChaveamentoTab data={data} ranking={ranking} />}
        {activeTab === "admin" && (
          <AdminTab
            data={data}
            persist={persist}
            isAdmin={isAdmin}
            setIsAdmin={setIsAdmin}
            pinInput={pinInput}
            setPinInput={setPinInput}
            pinError={pinError}
            setPinError={setPinError}
            adminTab={adminTab}
            setAdminTab={setAdminTab}
            saving={saving}
            error={error}
          />
        )}
      </main>
    </div>
  );
}

function RankingTab({ ranking }) {
  if (ranking.length === 0) {
    return (
      <div className="card">
        <div className="empty">
          Nenhum participante cadastrado ainda.
          <br />
          O organizador pode adicionar os nomes na aba "Organizador".
        </div>
      </div>
    );
  }

  const top3 = ranking.slice(0, 3);
  const rest = ranking.slice(3);

  return (
    <div className="card">
      <h2>Classificação</h2>
      {top3.length === 3 && (
        <div className="podium">
          <div className="podium-spot podium-2">
            <span className="medal">🥈</span>
            <div className="pname">{top3[1].name}</div>
            <div className="ppts">{top3[1].points}</div>
          </div>
          <div className="podium-spot podium-1">
            <span className="medal">🥇</span>
            <div className="pname">{top3[0].name}</div>
            <div className="ppts">{top3[0].points}</div>
          </div>
          <div className="podium-spot podium-3">
            <span className="medal">🥉</span>
            <div className="pname">{top3[2].name}</div>
            <div className="ppts">{top3[2].points}</div>
          </div>
        </div>
      )}
      <table className="rank-table">
        <thead>
          <tr>
            <th></th>
            <th>Nome</th>
            <th className="num">Pontos</th>
            <th className="num">Cheios</th>
            <th className="num">Parciais</th>
            <th className="num">Jogos</th>
          </tr>
        </thead>
        <tbody>
          {ranking.map((r, i) => (
            <tr key={r.name}>
              <td><span className="pos-badge">{i + 1}</span></td>
              <td>{r.name}</td>
              <td className="num">{r.points}</td>
              <td className="num">{r.exact}</td>
              <td className="num">{r.partial}</td>
              <td className="num">{r.played}</td>
            </tr>
          ))}
        </tbody>
      </table>
      <p className="hint">
        Placar exato vale {POINTS_EXACT} pontos. Acertar só o vencedor ou o empate vale {POINTS_OUTCOME} pontos.
      </p>
    </div>
  );
}

function PalpitesTab({ data, selectedDate, setSelectedDate }) {
  if (data.matches.length === 0) {
    return (
      <div className="card">
        <div className="empty">Nenhum jogo cadastrado ainda.</div>
      </div>
    );
  }
  const sortedDates = getSortedDates(data.matches);
  const groups = groupMatchesByDate(data.matches);
  const currentDate = sortedDates.includes(selectedDate) ? selectedDate : sortedDates[0];
  const matchesOfDay = groups[currentDate] || [];

  return (
    <div className="card">
      <h2>Palpites</h2>
      <label className="field-label">Escolha a data</label>
      <select
        className="select-field"
        value={currentDate}
        onChange={(e) => setSelectedDate(e.target.value)}
      >
        {sortedDates.map((d) => (
          <option key={d} value={d}>
            {d} {groups[d].length > 1 ? `(${groups[d].length} jogos)` : ""}
          </option>
        ))}
      </select>

      {matchesOfDay.map((match) => {
        const result = data.results[match.id];
        const preds = data.predictions[match.id] || {};
        return (
          <div key={match.id} style={{ marginTop: 16 }}>
            <div className="match-block">
              <div className="match-top">
                <span className="match-fase">{match.fase || "Jogo"}</span>
                <span className={`match-status ${result ? "status-done" : "status-pending"}`}>
                  {result ? "Finalizado" : "Aguardando"}
                </span>
              </div>
              <div className="match-teams">
                <span>{match.teamA}</span>
                <span className="match-result">{result ? `${result.a} x ${result.b}` : "vs"}</span>
                <span>{match.teamB}</span>
              </div>
            </div>

            {data.participants.length === 0 ? (
              <div className="empty">Nenhum participante cadastrado ainda.</div>
            ) : (
              data.participants.map((name) => {
                const pred = preds[name];
                const pts = calcPoints(pred, result);
                return (
                  <div className="pred-row" key={name}>
                    <span>{name}</span>
                    <span className="pred-score">{pred ? `${pred.a} x ${pred.b}` : "—"}</span>
                    <span
                      className={`pred-points ${
                        pts === null ? "pts-none" : pts === 5 ? "pts-5" : pts === 3 ? "pts-3" : "pts-0"
                      }`}
                    >
                      {pts === null ? "—" : `${pts} pts`}
                    </span>
                  </div>
                );
              })
            )}
          </div>
        );
      })}
    </div>
  );
}

function JogosTab({ data }) {
  if (data.matches.length === 0) {
    return (
      <div className="card">
        <div className="empty">Nenhum jogo cadastrado ainda.</div>
      </div>
    );
  }
  const groups = groupMatches(data.matches);
  return (
    <div>
      {Object.entries(groups).map(([fase, ms]) => (

function JogosPanel({ data, persist }) {
  const [teamA, setTeamA] = useState("");
  const [teamB, setTeamB] = useState("");
  const [fase, setFase] = useState("");
  const [dataJogo, setDataJogo] = useState("");
  const [bulkText, setBulkText] = useState("");
  const [saved, setSaved] = useState("");

  function addMatch() {
    if (!teamA.trim() || !teamB.trim()) return;
    const novo = { id: genId(), teamA: teamA.trim(), teamB: teamB.trim(), fase: fase.trim(), data: dataJogo.trim() };
    persist({ ...data, matches: [...data.matches, novo] });
    setTeamA("");
    setTeamB("");
    setSaved("Jogo adicionado.");
    setTimeout(() => setSaved(""), 2000);
  }

  function addBulk() {
    const lines = bulkText.split("\n").map((l) => l.trim()).filter((l) => l.length > 0);
    const novos = lines.map((line) => {
      const parts = line.split(";").map((p) => p.trim());
      return { id: genId(), teamA: parts[0] || "", teamB: parts[1] || "", fase: parts[2] || "", data: parts[3] || "" };
    }).filter((m) => m.teamA && m.teamB);
    if (novos.length === 0) return;
    persist({ ...data, matches: [...data.matches, ...novos] });
    setBulkText("");
    setSaved(`${novos.length} jogo(s) adicionado(s).`);
    setTimeout(() => setSaved(""), 2500);
  }

  function removeMatch(id) {
    const { [id]: _, ...restPred } = data.predictions;
    const { [id]: __, ...restRes } = data.results;
    persist({
      ...data,
      matches: data.matches.filter((m) => m.id !== id),
      predictions: restPred,
      results: restRes,
    });
  }

  return (
    <div>
      <div className="card">
        <h2>Adicionar jogo</h2>
        <label className="field-label">Time A</label>
        <input className="text-field" value={teamA} onChange={(e) => setTeamA(e.target.value)} placeholder="Brasil" />
        <label className="field-label">Time B</label>
        <input className="text-field" value={teamB} onChange={(e) => setTeamB(e.target.value)} placeholder="Argentina" />
        <label className="field-label">Fase / grupo (opcional)</label>
        <input className="text-field" value={fase} onChange={(e) => setFase(e.target.value)} placeholder="Grupo A" />
        <label className="field-label">Data / horário (opcional)</label>
        <input className="text-field" value={dataJogo} onChange={(e) => setDataJogo(e.target.value)} placeholder="15/06 - 16h" />
        <br />
        <br />
        <button className="btn" onClick={addMatch}>
          Adicionar jogo
        </button>
        {saved && <div className="saved-msg">{saved}</div>}
      </div>

      <div className="card">
        <h3>Adicionar vários jogos de uma vez</h3>
        <p className="hint">
          Um jogo por linha, no formato: Time A ; Time B ; Fase ; Data (os dois últimos são opcionais).
          <br />
          Exemplo: Brasil;Argentina;Grupo A;15/06 - 16h
        </p>
        <textarea
          className="text-field"
          rows={5}
          value={bulkText}
          onChange={(e) => setBulkText(e.target.value)}
          placeholder={"Brasil;Argentina;Grupo A;15/06\nFrança;Alemanha;Grupo B;16/06"}
        />
        <br />
        <br />
        <button className="btn secondary" onClick={addBulk}>
          Adicionar lista
        </button>
      </div>

      <div className="card">
        <h2>Jogos cadastrados ({data.matches.length})</h2>
        {data.matches.length === 0 && <div className="empty">Nenhum jogo ainda.</div>}
        {data.matches.map((m) => (
          <div className="list-item" key={m.id}>
            <span>
              <MatchLabel m={m} />
              {m.data ? <span className="tag">{m.data}</span> : null}
            </span>
            <button className="btn danger" onClick={() => removeMatch(m.id)}>
              Remover
            </button>
          </div>
        ))}
      </div>
    </div>
  );
}

function PalpitesPanel({ data, persist }) {
  const [selectedMatchId, setSelectedMatchId] = useState(data.matches[0]?.id || "");
  const [draft, setDraft] = useState({});
  const [saved, setSaved] = useState(false);

  const match = data.matches.find((m) => m.id === selectedMatchId);

  useEffect(() => {
    if (!match) return;
    const current = data.predictions[match.id] || {};
    const next = {};
    data.participants.forEach((name) => {
      next[name] = current[name] ? { a: String(current[name].a), b: String(current[name].b) } : { a: "", b: "" };
    });
    setDraft(next);
    setSaved(false);
    // eslint-disable-next-line
  }, [selectedMatchId, data.participants.length]);

  if (data.matches.length === 0) {
    return (
      <div className="card">
        <div className="empty">Cadastre jogos primeiro, na aba "Jogos".</div>
      </div>
    );
  }
  if (data.participants.length === 0) {
    return (
      <div className="card">
        <div className="empty">Cadastre os participantes primeiro, na aba "Participantes".</div>
      </div>
    );
  }

  function updateScore(name, side, value) {
    if (value !== "" && !/^\d{0,2}$/.test(value)) return;
    setDraft((d) => ({ ...d, [name]: { ...d[name], [side]: value } }));
  }

  function save() {
    const matchPreds = { ...(data.predictions[match.id] || {}) };
    data.participants.forEach((name) => {
      const a = draft[name]?.a;
      const b = draft[name]?.b;
      if (a !== "" && b !== "" && a !== undefined && b !== undefined) {
        matchPreds[name] = { a: Number(a), b: Number(b) };
      } else {
        delete matchPreds[name];
      }
    });
    persist({ ...data, predictions: { ...data.predictions, [match.id]: matchPreds } });
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
  }

  const groups = groupMatches(data.matches);

  return (
    <div className="card">
      <h2>Cadastrar palpites</h2>
      <label className="field-label">Jogo</label>
      <select className="select-field" value={selectedMatchId} onChange={(e) => setSelectedMatchId(e.target.value)}>
        {Object.entries(groups).map(([fase, ms]) => (
          <optgroup key={fase} label={fase}>
            {ms.map((m) => (
              <option key={m.id} value={m.id}>
                {m.teamA} x {m.teamB}
              </option>
            ))}
          </optgroup>
        ))}
      </select>

      <div style={{ marginTop: 14 }}>
        {data.participants.map((name) => (
          <div className="input-row" key={name}>
            <span style={{ flex: 1, fontSize: 14 }}>{name}</span>
            <input
              className="score-input"
              inputMode="numeric"
              value={draft[name]?.a ?? ""}
              onChange={(e) => updateScore(name, "a", e.target.value)}
            />
            <span className="score-vs">x</span>
            <input
              className="score-input"
              inputMode="numeric"
              value={draft[name]?.b ?? ""}
              onChange={(e) => updateScore(name, "b", e.target.value)}
            />
          </div>
        ))}
      </div>
      <br />
      <button className="btn" onClick={save}>
        Salvar palpites deste jogo
      </button>
      {saved && <div className="saved-msg">Palpites salvos!</div>}
    </div>
  );
}

function ResultadosPanel({ data, persist }) {
  const [selectedMatchId, setSelectedMatchId] = useState(data.matches[0]?.id || "");
  const [a, setA] = useState("");
  const [b, setB] = useState("");

    if (!match) return;
    const r = data.results[match.id];
    setA(r ? String(r.a) : "");

    return (
      <div className="card">
        <div className="empty">Cadastre jogos primeiro, na aba "Jogos".</div>
      </div>
    );
  }

  function save() {
    if (a === "" || b === "") return;
    persist({ ...data, results: { ...data.results, [match.id]: { a: Number(a), b: Number(b) } } });
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);

          value={a}
          onChange={(e) => /^\d{0,2}$/.test(e.target.value) && setA(e.target.value)}
        />
        <span className="score-vs">x</span>
        <input
          className="score-input"
          inputMode="numeric"
          value={b}

        <span style={{ fontWeight: 600 }}>{match?.teamB}</span>

      <br />

    </div>

function ImportarPanel({ data, persist }) {
  const [done, setDone] = useState(false);

  const newPredictionsCount = useMemo(() => {
    let count = 0;
    Object.entries(DEFAULT_DATA.predictions).forEach(([mid, preds]) => {
      Object.entries(preds).forEach(([name, val]) => {
        const current = data.predictions[mid]?.[name];
        if (!current || current.a !== val.a || current.b !== val.b) count += 1;
      });
    });
    return count;
  }, [data]);

  const newResultsCount = useMemo(() => {
    let count = 0;
    Object.entries(DEFAULT_DATA.results).forEach(([mid, val]) => {
      const current = data.results[mid];
      if (!current || current.a !== val.a || current.b !== val.b) count += 1;
    });
    return count;
  }, [data]);

  function importarAtualizacao() {
    const mergedPredictions = { ...data.predictions };
    Object.entries(DEFAULT_DATA.predictions).forEach(([mid, preds]) => {
      mergedPredictions[mid] = { ...(mergedPredictions[mid] || {}), ...preds };
    });
    const mergedResults = { ...data.results, ...DEFAULT_DATA.results };
    persist({ ...data, predictions: mergedPredictions, results: mergedResults });
    setDone(true);
    setTimeout(() => setDone(false), 3000);
  }

  return (
    <div className="card">
      <h2>Importar atualização da planilha</h2>
      <p className="hint">
        Quando o Claude atualizar os dados embutidos no app a partir de uma nova versão da sua planilha,
        use este botão para aplicar essas mudanças aos dados que já estão salvos aqui (sem apagar jogos,
        participantes ou edições feitas direto pelo app).
      </p>
      <p className="hint">
        Atualização disponível: <strong>{newPredictionsCount}</strong> palpite(s) e{" "}
        <strong>{newResultsCount}</strong> resultado(s) novos/diferentes.
      </p>
      {newPredictionsCount === 0 && newResultsCount === 0 ? (
        <p className="hint">Os dados já estão sincronizados com a última versão importada.</p>
      ) : (
        <button className="btn" onClick={importarAtualizacao}>
          Importar atualização
        </button>
      )}
      {done && <div className="saved-msg">Atualização importada! Ranking recalculado.</div>}
    </div>
  );
}



// ── Configuração do mata-mata ──────────────────────────────────────────────
const KNOCKOUT_PHASES = [
  { key: "Dezesseis avos de Final", label: "16 avos",  short: "R32", slots: 16 },
  { key: "Oitavas de Final",        label: "Oitavas",  short: "R16", slots: 8  },
  { key: "Quartas de Final",        label: "Quartas",  short: "QF",  slots: 4  },
  { key: "Semifinal",               label: "Semifinal",short: "SF",  slots: 2  },
  { key: "Disputa 3º Lugar",        label: "3º Lugar", short: "3P",  slots: 1  },
  { key: "Final",                   label: "Final",    short: "FIN", slots: 1  },
];

const PHASE_ORDER = KNOCKOUT_PHASES.map((p) => p.key);

function getKnockoutMatches(data) {
  const phaseKeys = new Set(PHASE_ORDER);
  return data.matches.filter((m) => phaseKeys.has(m.fase));
}

function getMatchWinner(match, results) {
  const r = results[match.id];
  if (!r) return null;
  if (r.a > r.b) return match.teamA;
  if (r.b > r.a) return match.teamB;
  return null; // empate — improvável no mata-mata mas tratamos
}

// ── BracketMatch – card de um confronto ──────────────────────────────────
function BracketMatchCard({ match, result, showLabel, isFinal }) {
  const winnerTeam = result
    ? result.a > result.b ? match.teamA : result.b > result.a ? match.teamB : null
    : null;

  const teamAWon = winnerTeam === match.teamA;
  const teamBWon = winnerTeam === match.teamB;

  const teamAName = match.teamA || null;
  const teamBName = match.teamB || null;

  return (
    <div className={`bracket-match${result ? " has-result" : ""}${isFinal ? " is-final" : ""}`}>
      {showLabel && (
        <div className="bracket-match-label">{match.data || ""}</div>
      )}
      <div className={`bracket-team${teamAWon ? " winner-row" : ""}`}>
        <span className={`bracket-team-name${!teamAName ? " tbd" : ""}`}>
          {teamAName || "A definir"}
        </span>
        {result && (
          <span className={`bracket-team-score${teamAWon ? " winner" : ""}`}>{result.a}</span>
        )}
      </div>
      <div className={`bracket-team${teamBWon ? " winner-row" : ""}`}>
        <span className={`bracket-team-name${!teamBName ? " tbd" : ""}`}>
          {teamBName || "A definir"}
        </span>
        {result && (
          <span className={`bracket-team-score${teamBWon ? " winner" : ""}`}>{result.b}</span>
        )}
      </div>
    </div>
  );
}

// ── Visão Desktop: bracket horizontal ────────────────────────────────────
function BracketDesktop({ data, matchesByPhase }) {
  // Fases principais (excluindo 3º lugar que fica separado)
  const mainPhases = KNOCKOUT_PHASES.filter((p) => p.key !== "Disputa 3º Lugar");
  const thirdPlace = KNOCKOUT_PHASES.find((p) => p.key === "Disputa 3º Lugar");
  const thirdMatches = matchesByPhase["Disputa 3º Lugar"] || [];

  // Campeão
  const finalMatches = matchesByPhase["Final"] || [];
  const champion = finalMatches.length > 0
    ? getMatchWinner(finalMatches[0], data.results)
    : null;

  return (
    <div>
      {champion && (
        <div className="champion-banner">
          <span className="trophy">🏆</span>
          <h3>{champion}</h3>
          <p>Campeão da Copa do Mundo 2026</p>
        </div>
      )}

      <div className="bracket-wrap">
        <div className="bracket-scroll">
          {mainPhases.map((phase, phaseIdx) => {
            const matches = matchesByPhase[phase.key] || [];
            const isEmpty = matches.length === 0;
            const isFinalPhase = phase.key === "Final";

            return (
              <div
                key={phase.key}
                className={`bracket-round${isFinalPhase ? " bracket-round-final" : ""}`}
              >
                <div className={`bracket-round-label${isFinalPhase ? " final-label" : ""}`}>
                  {phase.label}
                </div>
                <div className="bracket-slots">
                  {isEmpty ? (
                    <div className="bracket-empty">Aguardando jogos</div>
                  ) : (
                    matches.map((m) => (
                      <div key={m.id} style={{ position: "relative" }}>
                        <BracketMatchCard
                          match={m}
                          result={data.results[m.id]}
                          showLabel={true}
                          isFinal={isFinalPhase}
                        />
                        {phaseIdx < mainPhases.length - 1 && (
                          <div className="bracket-connector" />
                        )}
                      </div>
                    ))
                  )}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* 3º Lugar separado */}
      {(thirdMatches.length > 0) && (
        <div className="card" style={{ marginTop: 0 }}>
          <h2 style={{ fontSize: 14, marginBottom: 10 }}>🥉 Disputa pelo 3º Lugar</h2>
          {thirdMatches.map((m) => (
            <BracketMatchCard
              key={m.id}
              match={m}
              result={data.results[m.id]}
              showLabel={false}
              isFinal={false}
            />
          ))}
        </div>
      )}
    </div>
  );
}

// ── Visão Mobile: lista por fase ──────────────────────────────────────────
function BracketMobile({ data, matchesByPhase, activePhase, setActivePhase }) {
  const allPhases = KNOCKOUT_PHASES.filter((p) => (matchesByPhase[p.key] || []).length > 0);
  const currentMatches = matchesByPhase[activePhase] || [];
  const isFinal = activePhase === "Final";

  if (allPhases.length === 0) {
    return (
      <div className="card">
        <div className="empty">
          Nenhum jogo do mata-mata cadastrado ainda.<br />
          O organizador pode adicionar na aba Organizador → Jogos.
        </div>
      </div>
    );
  }

  const finalMatches = matchesByPhase["Final"] || [];
  const champion = finalMatches.length > 0
    ? getMatchWinner(finalMatches[0], data.results)
    : null;

  return (
    <div>
      {champion && (
        <div className="champion-banner">
          <span className="trophy">🏆</span>
          <h3>{champion}</h3>
          <p>Campeão da Copa do Mundo 2026</p>
        </div>
      )}

      <div className="phase-tabs">
        {KNOCKOUT_PHASES.map((phase) => {
          const hasMatches = (matchesByPhase[phase.key] || []).length > 0;
          if (!hasMatches) return null;
          return (
            <button
              key={phase.key}
              className={`phase-tab${activePhase === phase.key ? " active" : ""}`}
              onClick={() => setActivePhase(phase.key)}
            >
              {phase.short}
            </button>
          );
        })}
      </div>

      {currentMatches.length === 0 ? (
        <div className="card">
          <div className="empty">Nenhum jogo nesta fase ainda.</div>
        </div>
      ) : (
        currentMatches.map((m) => {
          const result = data.results[m.id];
          const winnerTeam = result
            ? result.a > result.b ? m.teamA : result.b > result.a ? m.teamB : null
            : null;

          return (
            <div
              key={m.id}
              className={`bracket-mobile-match${result ? " has-result" : ""}${isFinal ? " is-final" : ""}`}
            >
              <div className="bracket-mobile-phase">
                {activePhase}{m.data ? ` · ${m.data}` : ""}
              </div>
              <div className="bracket-mobile-teams">
                <span className={`bracket-mobile-team${!m.teamA ? " tbd" : ""}${winnerTeam === m.teamA ? "" : ""}`}>
                  {m.teamA || "A definir"}
                </span>
                <span className={`bracket-mobile-score${!result ? " pending" : ""}`}>
                  {result ? `${result.a} × ${result.b}` : "vs"}
                </span>
                <span className={`bracket-mobile-team right${!m.teamB ? " tbd" : ""}`}>
                  {m.teamB || "A definir"}
                </span>
              </div>
              {winnerTeam && (
                <div style={{ fontSize: 11, color: "#1B5E3A", fontWeight: 700, marginTop: 6, textAlign: "center" }}>
                  ✓ {winnerTeam} avança
                </div>
              )}
            </div>
          );
        })
      )}
    </div>
  );
}

// ── ChaveamentoTab principal ──────────────────────────────────────────────
function ChaveamentoTab({ data, ranking }) {
  const [view, setView] = useState("lista"); // "bracket" | "lista"
  const [activePhase, setActivePhase] = useState("Oitavas de Final");

  const knockoutMatches = getKnockoutMatches(data);

  // Agrupa por fase
  const matchesByPhase = {};
  KNOCKOUT_PHASES.forEach((p) => { matchesByPhase[p.key] = []; });
  knockoutMatches.forEach((m) => {
    if (matchesByPhase[m.fase]) matchesByPhase[m.fase].push(m);
  });

  // Define fase inicial com jogos
  React.useEffect(() => {
    const firstWithMatches = KNOCKOUT_PHASES.find(
      (p) => (matchesByPhase[p.key] || []).length > 0
    );
    if (firstWithMatches) setActivePhase(firstWithMatches.key);
  }, [knockoutMatches.length]);

  const totalKnockout = knockoutMatches.length;
  const finishedKnockout = knockoutMatches.filter((m) => data.results[m.id]).length;

  return (
    <div>
      <div className="card" style={{ marginBottom: 14 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
          <div>
            <h2 style={{ margin: 0 }}>Mata-mata</h2>
            <p className="hint" style={{ marginTop: 4 }}>
              {totalKnockout === 0
                ? "Nenhum jogo cadastrado ainda."
                : `${finishedKnockout} de ${totalKnockout} jogo(s) finalizado(s)`}
            </p>
          </div>
          {totalKnockout > 0 && (
            <div className="bracket-view-toggle">
              <button
                className={`view-btn${view === "lista" ? " active" : ""}`}
                onClick={() => setView("lista")}
              >
                ☰ Lista
              </button>
              <button
                className={`view-btn${view === "bracket" ? " active" : ""}`}
                onClick={() => setView("bracket")}
              >
                ⊞ Bracket
              </button>
            </div>
          )}
        </div>
      </div>

      {totalKnockout === 0 ? (
        <div className="card">
          <div className="empty">
            Os confrontos do mata-mata ainda não foram definidos.<br /><br />
            Quando os times se classificarem dos grupos, o organizador pode adicionar os jogos na aba{" "}
            <strong>🔒 Organizador → Jogos</strong>, usando as fases:<br /><br />
            <strong>Dezesseis avos de Final · Oitavas de Final · Quartas de Final · Semifinal · Disputa 3º Lugar · Final</strong>
          </div>
        </div>
      ) : view === "bracket" ? (
        <BracketDesktop data={data} matchesByPhase={matchesByPhase} />
      ) : (
        <BracketMobile
          data={data}
          matchesByPhase={matchesByPhase}
          activePhase={activePhase}
          setActivePhase={setActivePhase}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
